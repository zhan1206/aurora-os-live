name: 'QEMU Boot Test'
description: 'Boot AuroraOS ISO in QEMU and verify kernel self-tests'
inputs:
  iso-path:
    description: 'Path to the ISO file'
    required: false
    default: 'os.iso'
  boot-timeout:
    description: 'Maximum seconds to wait for boot'
    required: false
    default: '90'
  memory:
    description: 'Memory allocated to VM (MB)'
    required: false
    default: '256'
  verify-self-tests:
    description: 'Whether to verify kernel self-tests'
    required: false
    default: 'true'
outputs:
  booted:
    description: 'Whether the kernel booted successfully'
    value: ${{ steps.boot-check.outputs.booted }}
  test-failures:
    description: 'Number of self-test failures'
    value: ${{ steps.test-verify.outputs.failures }}

runs:
  using: 'composite'
  steps:
    - name: Boot QEMU
      id: boot-check
      shell: bash
      timeout-minutes: 3
      run: |
        set -euo pipefail
        ISO="${{ inputs.iso-path }}"
        MEM="${{ inputs.memory }}"
        TIMEOUT="${{ inputs.boot-timeout }}"

        echo "::group::QEMU Boot — $ISO ($MEM MB, ${TIMEOUT}s timeout)"

        # Create a temporary directory for QEMU output artifacts
        QEMU_TMPDIR=$(mktemp -d)
        echo "QEMU temp dir: $QEMU_TMPDIR"

        # Run QEMU with serial output to file, also capture via stdio
        qemu-system-x86_64 -m "${MEM}M" -cdrom "$ISO" -nographic -no-reboot \
          -serial file:"$QEMU_TMPDIR/serial.log" \
          -monitor unix:"$QEMU_TMPDIR/monitor.sock",server,nowait \
          2>&1 | tee qemu_output.log &
        QEMU_PID=$!

        BOOT_OK=0
        START_TIME=$(date +%s)
        for i in $(seq 1 "$TIMEOUT"); do
          if grep -q "System Ready" qemu_output.log 2>/dev/null; then
            ELAPSED=$(($(date +%s) - START_TIME))
            echo "PASS: Kernel booted successfully (${ELAPSED}s, ${i} polls)"
            echo "booted=1" >> "$GITHUB_OUTPUT"
            BOOT_OK=1
            break
          fi
          if ! kill -0 $QEMU_PID 2>/dev/null; then
            echo "FAIL: QEMU exited unexpectedly (exit code: $?)"
            echo "::group::QEMU Output (last 100 lines)"
            tail -100 qemu_output.log
            echo "::endgroup::"
            echo "::group::Serial Log (last 100 lines)"
            tail -100 "$QEMU_TMPDIR/serial.log" 2>/dev/null || echo "(no serial log)"
            echo "::endgroup::"
            echo "booted=0" >> "$GITHUB_OUTPUT"
            # Save artifacts for upload
            cp qemu_output.log "$QEMU_TMPDIR/console.log" 2>/dev/null || true
            echo "qemu_tmpdir=$QEMU_TMPDIR" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          sleep 1
        done

        if [ "$BOOT_OK" != "1" ]; then
          echo "FAIL: Kernel did not reach 'System Ready' within ${TIMEOUT}s"
          echo "::group::QEMU Output (last 100 lines)"
          tail -100 qemu_output.log
          echo "::endgroup::"
          echo "::group::Serial Log (last 100 lines)"
          tail -100 "$QEMU_TMPDIR/serial.log" 2>/dev/null || echo "(no serial log)"
          echo "::endgroup::"
          echo "booted=0" >> "$GITHUB_OUTPUT"
          # Save artifacts for upload
          cp qemu_output.log "$QEMU_TMPDIR/console.log" 2>/dev/null || true
          echo "qemu_tmpdir=$QEMU_TMPDIR" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        # Give the kernel a moment to finish self-tests
        sleep 2

        # Attempt to capture screenshot via QMP
        if [ -S "$QEMU_TMPDIR/monitor.sock" ]; then
          echo '{"execute":"qmp_capabilities"}' | nc -U "$QEMU_TMPDIR/monitor.sock" -w 1 2>/dev/null || true
          echo '{"execute":"screendump","arguments":{"filename":"screenshot.ppm"}}' | nc -U "$QEMU_TMPDIR/monitor.sock" -w 2 2>/dev/null || true
          if [ -f screenshot.ppm ]; then
            # Convert PPM to PNG if ImageMagick is available
            if command -v convert &>/dev/null; then
              convert screenshot.ppm "$QEMU_TMPDIR/screenshot.png" 2>/dev/null || true
            else
              cp screenshot.ppm "$QEMU_TMPDIR/screenshot.ppm" 2>/dev/null || true
            fi
            echo "Screenshot captured"
          fi
        fi

        # Cleanup
        kill $QEMU_PID 2>/dev/null || true
        wait $QEMU_PID 2>/dev/null || true

        echo "qemu_tmpdir=$QEMU_TMPDIR" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Verify self-tests
      if: ${{ inputs.verify-self-tests == 'true' }}
      id: test-verify
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Self-Test Verification"

        # Define all 16 expected self-tests
        declare -a TESTS=(
          "alloc_page/free_page single page"
          "stress alloc:"
          "re-alloc after stress"
          "kmalloc/kfree all size classes"
          "kmalloc(0) handled"
          "get_kernel_cr3"
          "clone_current_pml4"
          "free_pagetable (COW-aware)"
          "current task exists"
          "create_task"
          "waitpid + exit code collection"
          "root filesystem mounted"
          "vfs_lookup(/)"
          "vfs_lookup nonexistent returns NULL"
          "sys_pipe create"
          "pipe write + read roundtrip"
        )

        FAILS=0
        PASSED=0
        for test_name in "${TESTS[@]}"; do
          if grep -q "\[PASS\] $test_name" qemu_output.log 2>/dev/null; then
            echo "  [PASS] $test_name"
            PASSED=$((PASSED + 1))
          else
            echo "  [FAIL] $test_name"
            FAILS=$((FAILS + 1))
          fi
        done

        echo "failures=$FAILS" >> "$GITHUB_OUTPUT"

        echo ""
        echo "Results: $PASSED passed, $FAILS failed (of ${#TESTS[@]} total)"

        if grep -q "All Tests Passed" qemu_output.log 2>/dev/null; then
          echo "All Tests Passed banner: YES"
        else
          echo "All Tests Passed banner: NO (warning only)"
        fi

        if [ "$FAILS" -gt 0 ]; then
          echo ""
          echo "::error::$FAILS self-test(s) failed"
          exit 1
        fi

        echo "::endgroup::"

    - name: Generate JUnit report
      if: ${{ inputs.verify-self-tests == 'true' }}
      shell: bash
      run: |
        python3 scripts/generate_junit_report.py qemu_output.log test-results.xml 2>/dev/null || {
          echo "::warning::JUnit report generation failed (non-fatal)"
        }

    - name: Upload QEMU debug artifacts
      if: failure()
      shell: bash
      run: |
        echo "::group::QEMU Failure Debug Info"
        echo "=== Full Console Log ==="
        cat qemu_output.log 2>/dev/null || echo "(no console log)"
        echo ""
        echo "=== Full Serial Log ==="
        if [ -n "${QEMU_TMPDIR:-}" ] && [ -f "$QEMU_TMPDIR/serial.log" ]; then
          cat "$QEMU_TMPDIR/serial.log"
        else
          echo "(no serial log)"
        fi
        echo "::endgroup::"