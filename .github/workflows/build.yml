# ─────────────────────────────────────────────────────────────────────
#  AuroraOS CI/CD Pipeline
#  ─────────────────────────────────────────────────────────────────────
#  Triggers: push (any branch), pull_request, manual dispatch
#  Jobs:     checkstyle → lint → clang-tidy → build-linux (matrix) + build-macos → compliance
#  ─────────────────────────────────────────────────────────────────────

name: CI Build & Test

# ── Triggers ──────────────────────────────────────────────────────────

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type'
        required: false
        default: 'both'
        type: choice
        options: [release, debug, both]

# ── Global settings ───────────────────────────────────────────────────

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# ── Jobs ──────────────────────────────────────────────────────────────

jobs:

  # ────────────────────────────────────────────────────────────────────
  #  Checkstyle — Code style enforcement (runs first, independent)
  # ────────────────────────────────────────────────────────────────────
  checkstyle:
    name: 'Code Style Check'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run code style checks
        continue-on-error: true
        run: |
          chmod +x .github/workflows/checkstyle.sh
          .github/workflows/checkstyle.sh

  # ────────────────────────────────────────────────────────────────────
  #  Lint — Static code analysis (runs after checkstyle)
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: 'Lint & Static Analysis'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: checkstyle
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check C code style consistency
        run: |
          echo "::group::Code Style Checks"
          ISSUES=0

          # Check for tabs vs spaces consistency
          if grep -rlP '\t' kernel/ arch/ 2>/dev/null; then
            echo "::warning::Tab characters found in source files (consider using spaces)"
            ISSUES=1
          fi

          # Check for trailing whitespace
          if grep -rlP '[ \t]+$' kernel/ arch/ 2>/dev/null; then
            echo "::notice::Trailing whitespace found in some files"
          fi

          # Check for missing newline at EOF
          for f in $(find kernel/ arch/ -type f -name '*.[chS]' 2>/dev/null); do
            if [ -s "$f" ] && [ "$(tail -c1 "$f" | wc -l)" -eq 0 ]; then
              echo "::notice::$f: missing newline at end of file"
            fi
          done

          if [ "$ISSUES" -eq 1 ]; then
            echo "::warning::Code style issues found (non-blocking)"
          fi
          echo "::endgroup::"

      - name: Validate assembly syntax
        run: |
          echo "::group::Assembly Syntax Validation"
          for f in $(find kernel/ arch/ -type f -name '*.S' 2>/dev/null); do
            echo "  Checking: $f"
            # Check for common ASM issues
            if grep -q '^\s*[a-z][a-z ]*[^lqwb]$' "$f" 2>/dev/null; then
              echo "    OK"
            fi
          done
          echo "::endgroup::"

      - name: Check documentation references
        run: |
          echo "::group::Documentation Checks"
          # Verify all docs/ files are referenced in README
          DOCS=$(find docs/ -name '*.md' -type f 2>/dev/null | sort)
          for d in $DOCS; do
            basename=$(basename "$d")
            if grep -q "$basename" README.md 2>/dev/null; then
              echo "  [OK] $basename referenced in README"
            else
              echo "  [--] $basename not referenced in README"
            fi
          done
          echo "::endgroup::"

  # ────────────────────────────────────────────────────────────────────
  #  cppcheck — Static analysis (non-blocking, informational only)
  # ────────────────────────────────────────────────────────────────────
  cppcheck:
    name: 'cppcheck Static Analysis'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    if: ${{ !cancelled() }}
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cppcheck

      - name: Run cppcheck
        run: |
          echo "::group::cppcheck Analysis"
          cppcheck --enable=all --inconclusive --suppress=missingIncludeSystem \
            --suppress=unusedFunction --suppress=unmatchedSuppression \
            --inline-suppr \
            -I kernel/include \
            --template='::{severity} file={file},line={line},col={column}::{message}' \
            kernel/ arch/ boot/ 2>&1 | tee cppcheck_report.txt || true

          ERROR_COUNT=$(grep -c '::error' cppcheck_report.txt 2>/dev/null || echo 0)
          WARN_COUNT=$(grep -c '::warning' cppcheck_report.txt 2>/dev/null || echo 0)
          echo "  Errors: $ERROR_COUNT"
          echo "  Warnings: $WARN_COUNT"
          echo "::endgroup::"

          if [ -s cppcheck_report.txt ]; then
            echo "## cppcheck Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat cppcheck_report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ────────────────────────────────────────────────────────────────────
  #  Build + Test — Linux (matrix: release + debug)
  # ────────────────────────────────────────────────────────────────────
  build-linux:
    name: 'Linux ${{ matrix.build-type }}'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    if: ${{ !cancelled() }}

    strategy:
      fail-fast: false
      matrix:
        build-type:
          - release
          - debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Dependency Cache ────────────────────────────────────────
      - name: Cache APT packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential \
            xorriso \
            grub-pc-bin \
            mtools \
            qemu-system-x86 \
            qemu-utils \
            python3

      # ── Build Userspace ─────────────────────────────────────────
      - name: Build userspace programs
        run: |
          echo "::group::Build userspace"
          make -C userspace -f Makefile
          echo "::endgroup::"

      - name: Embed userspace binaries
        run: |
          echo "::group::Embed binaries"
          python3 scripts/embed_binary.py userspace/hello kernel/embedded_files.c
          python3 scripts/embed_binary.py userspace/shell kernel/embedded_files.c
          echo "::endgroup::"

      # ── Build Kernel ────────────────────────────────────────────
      - name: Build kernel (${{ matrix.build-type }})
        id: build
        run: |
          echo "::group::Kernel build"
          BUILD_START=$(date +%s)
          if [ "${{ matrix.build-type }}" = "debug" ]; then
            make debug
          else
            make
          fi
          BUILD_END=$(date +%s)
          BUILD_TIME=$((BUILD_END - BUILD_START))
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "Build completed in ${BUILD_TIME}s"
          echo "::endgroup::"

      - name: Create ISO
        id: iso
        run: |
          echo "::group::ISO generation"
          make iso
          ls -lh os.iso
          KERNEL_SIZE=$(stat -c%s build/kernel.elf 2>/dev/null || echo 0)
          ISO_SIZE=$(stat -c%s os.iso 2>/dev/null || echo 0)
          echo "kernel_size=${KERNEL_SIZE}" >> "$GITHUB_OUTPUT"
          echo "iso_size=${ISO_SIZE}" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      # ── QEMU Boot Test + Self-Test Verification ─────────────────
      - name: QEMU boot test
        uses: ./.github/actions/qemu-boot-test
        with:
          iso-path: os.iso
          boot-timeout: '90'
          memory: '256'
          verify-self-tests: 'true'

      # ── Publish Test Report ─────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-${{ matrix.build-type }}
          path: test-results.xml
          retention-days: 7

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'Kernel Tests (${{ matrix.build-type }})'
          path: test-results.xml
          reporter: java-junit
          fail-on-error: 'true'

      # ── Upload Build Artifacts ──────────────────────────────────
      - name: Upload ISO artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aurora-os-linux-${{ matrix.build-type }}
          path: os.iso
          retention-days: 7

      - name: Upload QEMU output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-output-linux-${{ matrix.build-type }}
          path: qemu_output.log
          retention-days: 3

      # ── Build Summary ───────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          FILES_COMPILED=$(find kernel/ arch/ -type f \( -name '*.c' -o -name '*.S' \) 2>/dev/null | wc -l)
          KERNEL_SIZE=${{ steps.iso.outputs.kernel_size }}
          ISO_SIZE=${{ steps.iso.outputs.iso_size }}
          BUILD_TIME=${{ steps.build.outputs.build_time }}

          # Format sizes
          KERNEL_SIZE_KB=$(awk "BEGIN {printf \"%.1f\", ${KERNEL_SIZE}/1024}")
          ISO_SIZE_MB=$(awk "BEGIN {printf \"%.1f\", ${ISO_SIZE}/1048576}")

          # Parse self-test results from QEMU output
          if [ -f qemu_output.log ]; then
            TOTAL_TESTS=$(grep -c '\[PASS\]\|\[FAIL\]' qemu_output.log 2>/dev/null || echo 0)
            PASSED_TESTS=$(grep -c '\[PASS\]' qemu_output.log 2>/dev/null || echo 0)
            FAILED_TESTS=$(grep -c '\[FAIL\]' qemu_output.log 2>/dev/null || echo 0)
          else
            TOTAL_TESTS=0
            PASSED_TESTS=0
            FAILED_TESTS=0
          fi

          echo "## Build Summary — ${{ matrix.build-type }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Time | ${BUILD_TIME}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files Compiled | ${FILES_COMPILED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kernel Size | ${KERNEL_SIZE} bytes (${KERNEL_SIZE_KB} KB) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ISO Size | ${ISO_SIZE} bytes (${ISO_SIZE_MB} MB) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Self-Tests Passed | ${PASSED_TESTS}/${TOTAL_TESTS} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${FAILED_TESTS}" -gt 0 ]; then
            echo "| Self-Tests Failed | ${FAILED_TESTS} :x: |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Self-Tests Failed | 0 :white_check_mark: |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${FAILED_TESTS}" -gt 0 ]; then
            echo ":x: **Build completed with ${FAILED_TESTS} test failure(s)**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo ":rocket: **${{ matrix.build-type }} build successful**" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ────────────────────────────────────────────────────────────────────
  #  Build + Smoke Test — macOS (cross-compile)
  # ────────────────────────────────────────────────────────────────────
  build-macos:
    name: 'macOS (cross-compile)'
    runs-on: macos-latest
    timeout-minutes: 15
    needs: lint
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Dependency Cache ────────────────────────────────────────
      - name: Cache Homebrew
        uses: actions/cache@v4
        id: cache-brew
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            brew-${{ runner.os }}-

      - name: Install dependencies
        run: |
          brew install x86_64-elf-gcc x86_64-elf-binutils xorriso mtools qemu python3

      # ── Build Userspace ─────────────────────────────────────────
      - name: Build userspace programs
        run: |
          echo "::group::Build userspace"
          make -C userspace -f Makefile
          echo "::endgroup::"

      - name: Embed userspace binaries
        run: |
          echo "::group::Embed binaries"
          python3 scripts/embed_binary.py userspace/hello kernel/embedded_files.c
          python3 scripts/embed_binary.py userspace/shell kernel/embedded_files.c
          echo "::endgroup::"

      # ── Build Kernel + ISO ──────────────────────────────────────
      - name: Build kernel
        run: |
          echo "::group::Build"
          make
          echo "::endgroup::"

      - name: Create ISO
        run: |
          echo "::group::ISO"
          make iso
          ls -lh os.iso
          echo "::endgroup::"

      # ── QEMU Smoke Test ─────────────────────────────────────────
      - name: QEMU smoke test
        uses: ./.github/actions/qemu-boot-test
        with:
          iso-path: os.iso
          boot-timeout: '90'
          memory: '256'
          verify-self-tests: 'false'

      - name: Upload ISO artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aurora-os-macos
          path: os.iso
          retention-days: 7

      - name: Upload QEMU output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-output-macos
          path: qemu_output.log
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────
  #  Compliance Gate — Final validation before merge
  # ────────────────────────────────────────────────────────────────────
  compliance:
    name: 'Compliance Gate'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-linux, build-macos]
    if: ${{ !cancelled() && !failure() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify build matrix
        run: |
          echo "::group::Build Matrix Verification"
          echo "  - Linux (release):  ${{ needs.build-linux.result }}"
          echo "  - Linux (debug):    ${{ needs.build-linux.result }}"
          echo "  - macOS:            ${{ needs.build-macos.result }}"
          echo ""
          echo "All builds passed — compliance gate satisfied."
          echo "::endgroup::"

      - name: Check required files
        run: |
          echo "::group::Required Files Check"
          REQUIRED=(
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            "first-contributions.md"
            "Makefile"
            "linker.ld"
            ".gitignore"
            ".github/workflows/build.yml"
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "  [OK] $f"
            else
              echo "  [MISSING] $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required file(s) missing"
            exit 1
          fi
          echo "::endgroup::"

      - name: Validate kernel source structure
        run: |
          echo "::group::Source Structure"
          echo "Kernel C files:  $(find kernel/ -name '*.c' -type f | wc -l)"
          echo "Kernel headers:  $(find kernel/ -name '*.h' -type f | wc -l)"
          echo "Assembly files:  $(find kernel/ arch/ -name '*.S' -type f | wc -l)"
          echo "Documentation:   $(find docs/ -name '*.md' -type f | wc -l)"
          echo "::endgroup::"

      - name: Compliance summary
        run: |
          echo "## Compliance Gate Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Linux Release Build | ${{ needs.build-linux.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Linux Debug Build | ${{ needs.build-linux.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| macOS Build | ${{ needs.build-macos.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Required Files | PASS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Structure | PASS |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo ":white_check_mark: **All checks passed — ready for merge.**" >> "$GITHUB_STEP_SUMMARY"