# ─────────────────────────────────────────────────────────────────────
#  AuroraOS GitHub Releases Automation
#  ─────────────────────────────────────────────────────────────────────
#  Trigger: Push of a tag matching 'v*' (e.g. v3.0.0)
#  Jobs:    Build release kernel + ISO, UEFI bootloader, kernel modules,
#           generate release notes from CHANGELOG.md, create GitHub Release.
#  ─────────────────────────────────────────────────────────────────────

name: Release

# ── Triggers ──────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'          # e.g. v3.0.0, v3.0.0-alpha, v3.0.0-rc1
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.0.0)'
        required: true
        type: string

# ── Global settings ───────────────────────────────────────────────────

defaults:
  run:
    shell: bash

permissions:
  contents: write
  packages: read

# ── Jobs ──────────────────────────────────────────────────────────────

jobs:

  # ────────────────────────────────────────────────────────────────────
  #  Build — Release kernel + ISO + UEFI + modules
  # ────────────────────────────────────────────────────────────────────
  build:
    name: 'Build Release Artifacts'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog parsing

      # ── Determine tag ────────────────────────────────────────────
      - name: Set release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      # ── Install dependencies ─────────────────────────────────────
      - name: Cache APT packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: /var/cache/apt/archives
          key: apt-release-${{ runner.os }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            apt-release-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential \
            xorriso \
            grub-pc-bin \
            mtools \
            qemu-system-x86 \
            qemu-utils \
            python3

      # ── Build Userspace ──────────────────────────────────────────
      - name: Build userspace programs
        run: |
          echo "::group::Build userspace"
          make -C userspace -f Makefile
          echo "::endgroup::"

      - name: Embed userspace binaries
        run: |
          echo "::group::Embed binaries"
          python3 scripts/embed_binary.py userspace/hello kernel/embedded_files.c
          python3 scripts/embed_binary.py userspace/shell kernel/embedded_files.c
          echo "::endgroup::"

      # ── Build Release Kernel ─────────────────────────────────────
      - name: Build release kernel
        run: |
          echo "::group::Build kernel"
          make
          echo "::endgroup::"

      # ── Build UEFI Bootloader ────────────────────────────────────
      - name: Build UEFI bootloader
        run: |
          echo "::group::Build UEFI"
          make uefi
          echo "::endgroup::"

      # ── Build Kernel Modules ─────────────────────────────────────
      - name: Build kernel modules
        run: |
          echo "::group::Build modules"
          make modules
          echo "::endgroup::"

      # ── Create ISO ───────────────────────────────────────────────
      - name: Create ISO
        run: |
          echo "::group::ISO generation"
          make iso
          ls -lh os.iso
          ls -lh build/kernel.elf
          ls -lh iso/EFI/BOOT/BOOTX64.EFI 2>/dev/null || echo "UEFI not in ISO dir"
          ls -lh build/modules/mod_sample.ko 2>/dev/null || echo "Module not built"
          echo "::endgroup::"

      # ── Verify artifacts exist ───────────────────────────────────
      - name: Verify artifacts
        run: |
          echo "::group::Artifact verification"
          FAIL=0
          for f in os.iso iso/EFI/BOOT/BOOTX64.EFI build/modules/mod_sample.ko; do
            if [ -f "$f" ]; then
              echo "  [OK] $f ($(du -h "$f" | cut -f1))"
            else
              echo "  [WARN] $f not found"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::warning::Some artifacts are missing"
          fi
          echo "::endgroup::"

      # ── Upload Build Artifacts ───────────────────────────────────
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: os.iso
          path: os.iso
          retention-days: 30

      - name: Upload UEFI bootloader
        uses: actions/upload-artifact@v4
        with:
          name: BOOTX64.EFI
          path: iso/EFI/BOOT/BOOTX64.EFI
          retention-days: 30

      - name: Upload kernel module
        uses: actions/upload-artifact@v4
        with:
          name: mod_sample.ko
          path: build/modules/mod_sample.ko
          retention-days: 30

      - name: Upload kernel ELF
        uses: actions/upload-artifact@v4
        with:
          name: kernel.elf
          path: build/kernel.elf
          retention-days: 30

      # ── Generate Release Notes from CHANGELOG.md ─────────────────
      - name: Extract release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"  # Strip 'v' prefix

          # Extract the section for this version from CHANGELOG.md
          # Format: ## vX.Y.Z ... up to the next ## or ---
          RELEASE_NOTES=$(awk -v ver="${VERSION}" '
            BEGIN { found=0; }
            /^## v/ {
              if (found) exit;
              if ($0 ~ "^## v" ver " ") { found=1; next; }
            }
            found { print; }
          ' CHANGELOG.md 2>/dev/null || true)

          if [ -z "$RELEASE_NOTES" ]; then
            # Fallback: try matching the exact tag
            RELEASE_NOTES=$(awk -v tag="${TAG}" '
              BEGIN { found=0; }
              /^## '"${TAG}"'/ {
                if (found) exit;
                if ($0 ~ "^## '"${TAG}"' ") { found=1; next; }
              }
              found { print; }
            ' CHANGELOG.md 2>/dev/null || true)
          fi

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release ${TAG} — see CHANGELOG.md for details."
          fi

          # Write to file (multiline output for GitHub Actions)
          cat << 'RELEASE_NOTES_EOF' > release_notes.md
          $RELEASE_NOTES
          RELEASE_NOTES_EOF

          # Escape special characters for GitHub Actions output
          {
            echo 'notes<<RELEASE_NOTES_DELIMITER'
            cat release_notes.md
            echo 'RELEASE_NOTES_DELIMITER'
          } >> "$GITHUB_OUTPUT"

          echo "Release notes generated for ${TAG}"

      # ── Create GitHub Release ────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'AuroraOS ${{ steps.tag.outputs.tag }}'
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-alpha') || contains(steps.tag.outputs.tag, '-beta') || contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-pre') }}
          files: |
            os.iso
            iso/EFI/BOOT/BOOTX64.EFI
            build/modules/mod_sample.ko
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Release Summary ──────────────────────────────────────────
      - name: Release summary
        if: always()
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "## Release: AuroraOS ${TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Asset | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          if [ -f os.iso ]; then
            echo "| os.iso | :white_check_mark: $(du -h os.iso | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| os.iso | :x: Missing |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f iso/EFI/BOOT/BOOTX64.EFI ]; then
            echo "| BOOTX64.EFI | :white_check_mark: $(du -h iso/EFI/BOOT/BOOTX64.EFI | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| BOOTX64.EFI | :x: Missing |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f build/modules/mod_sample.ko ]; then
            echo "| mod_sample.ko | :white_check_mark: $(du -h build/modules/mod_sample.ko | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| mod_sample.ko | :x: Missing |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo ":rocket: **Release ${TAG} created** — [View Release](https://github.com/\${{ github.repository }}/releases/tag/${TAG})" >> "$GITHUB_STEP_SUMMARY"