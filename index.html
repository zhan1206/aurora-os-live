<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuroraOS - 浏览器中的 x86_64 操作系统</title>
<style>
:root {
    --bg: #0a0a0f;
    --surface: #141420;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent-glow: #a78bfa;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: "Inter","Segoe UI",system-ui,sans-serif; }

.topbar {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
    gap: 6px;
}
.topbar h1 { font-size: 1.1rem; background: linear-gradient(135deg,var(--accent-glow),#6366f1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.status-row { display:flex; gap:8px; font-size:0.72rem; color:var(--muted); flex-wrap:wrap; }
.status-row span { display:flex; align-items:center; gap:3px; }
.dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
.dot.loading{background:var(--yellow);animation:pulse 1.2s infinite;}
.dot.ok{background:var(--green)}.dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.bar {
    padding: 6px 16px;
    display: flex;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
    align-items: center;
}
.bar button {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: transparent;
    color: var(--text);
    font-size: 0.75rem;
    cursor: pointer;
}
.bar button:hover:not(:disabled){border-color:var(--accent);color:var(--accent-glow)}
.bar button:disabled{opacity:.4;cursor:not-allowed}
.bar button.go{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.bar button.go:hover:not(:disabled){background:#6d28d9}
.bar .hint{margin-left:auto;font-size:.7rem;color:var(--muted)}

.wrap {
    margin: 8px 16px 0;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: #000;
    position: relative;
    /* fixed 4:3 aspect ratio container */
    width: min(960px, calc(100vw - 36px));
    max-width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
}
.wrap canvas { width: 100%; height: 100%; display: block; }

.note {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    background: rgba(0,0,0,.9);
    z-index: 10;
}
.note p { color: var(--muted); font-size: .82rem; max-width: 75%; text-align: center; }
.bar2 { width:180px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.bar2f { height:100%; background:var(--accent); width:0%; transition:width .4s ease; }

.log {
    margin: 8px 16px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    max-height: 160px;
    overflow-y: auto;
    font-family: "JetBrains Mono","Cascadia Code",monospace;
    font-size: .68rem;
    line-height: 1.5;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-all;
}
.log span.ok { color: var(--green); }
.log span.err { color: var(--red); }
.log span.warn { color: var(--yellow); }
.log span.out { color: #6ee7b7; }

footer {
    text-align: center;
    padding: 6px;
    color: var(--muted);
    font-size: .65rem;
    border-top: 1px solid var(--border);
}
footer a { color: var(--accent-glow); text-decoration: none; }
</style>
</head>
<body>

<div class="topbar">
    <h1>AuroraOS</h1>
    <span style="font-size:.7rem;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;">v4.0.5</span>
    <div class="status-row">
        <span id="st-sab"><span class="dot loading"></span> SAB</span>
        <span id="st-v86"><span class="dot loading"></span> v86</span>
        <span id="st-os"><span class="dot loading"></span> OS</span>
    </div>
</div>

<div class="bar">
    <button class="go" id="btn-go" onclick="boot()" disabled>▶ 启动</button>
    <button id="btn-rst" onclick="reset_()" disabled>↻ 重启</button>
    <button id="btn-cc" onclick="k('ctrl+c')" disabled>Ctrl+C</button>
    <button id="btn-enter" onclick="k('enter')" disabled>Enter</button>
    <span class="hint" id="hint-txt"></span>
</div>

<div class="wrap" id="screen-host">
    <div class="note" id="ov">
        <p id="ov-msg">检测环境...</p>
        <div class="bar2"><div class="bar2f" id="barf"></div></div>
    </div>
</div>

<div class="log" id="log">🔍 诊断日志</div>

<footer>
    AuroraOS © <a href="https://github.com/zhan1206/aurora-os" target="_blank">zhan1206/aurora-os</a>
    · 100% 自研 · x86_64 · MIT
</footer>

<script>
// ======== COI Service Worker ========
(function(){
    if (window.crossOriginIsolated) {
        L('SAB 环境已就绪 ✓');
        SS('st-sab','ok','就绪');
        checkReady();
        return;
    }
    L('crossOriginIsolated=false, 注册 SW...');
    if (!navigator.serviceWorker) {
        L('❌ 浏览器不支持 ServiceWorker, 无法运行');
        SS('st-sab','err','浏览器不支持');
        document.getElementById('ov-msg').textContent = '需要使用 Chrome/Edge/Firefox 来运行';
        return;
    }
    // Unregister any old SW first
    navigator.serviceWorker.getRegistrations().then(function(regs){
        return Promise.all(regs.map(function(r){ return r.unregister(); }));
    }).then(function(){
        return navigator.serviceWorker.register('sw.js', {scope:'/'});
    }).then(function(reg){
        L('SW 注册成功, 等待激活...');
        if (reg.installing) {
            reg.installing.addEventListener('statechange', function(){
                L('SW state: '+reg.installing.state);
            });
        }
        reg.addEventListener('updatefound', function(){
            var w = reg.installing;
            if (!w) return;
            w.addEventListener('statechange', function(){
                if (w.state === 'activated') {
                    L('SW 已激活, 1.5秒后刷新...');
                    setTimeout(function(){ location.reload(); }, 1500);
                }
            });
        });
        if (reg.active) {
            L('SW 已激活, 刷新以生效...');
            setTimeout(function(){ location.reload(); }, 1000);
        }
    }).catch(function(e){
        L('❌ SW 注册失败: '+e.message);
        SS('st-sab','err','SW 失败');
        document.getElementById('ov-msg').textContent = 'Service Worker 注册失败，请用 Chrome 打开';
    });
})();

// ======== LOG ========
function L(m) {
    var e = document.getElementById('log');
    e.innerHTML += '\n' + m;
    e.scrollTop = e.scrollHeight;
}
function SS(id, cls, txt) {
    var e = document.getElementById(id), d = e.querySelector('.dot');
    d.className = 'dot ' + cls;
    e.childNodes[1].textContent = ' ' + txt;
}

// ======== DETECT ========
function init(){
    L('SAB='+!!window.SharedArrayBuffer+' Atomics='+!!window.Atomics+' crossOriginIsolated='+window.crossOriginIsolated);
    L('V86 loaded: '+ (typeof V86 !== 'undefined'));
    if (typeof V86 === 'undefined') { SS('st-v86','err','未加载'); return; }
    SS('st-v86','ok','已加载');
    checkReady();
}

function checkReady(){
    if (!window.SharedArrayBuffer || !window.Atomics) {
        L('⚠ 未 crossOriginIsolated - 如果已刷新过仍看到此提示，请手动 Ctrl+Shift+R');
        SS('st-sab','err','未就绪');
        document.getElementById('ov-msg').textContent = '请刷新页面 (Ctrl+Shift+R)';
        document.getElementById('btn-go').disabled = false; // let user try anyway
        return;
    }
    SS('st-sab','ok','就绪');
    SS('st-os','loading','等待启动');
    document.getElementById('btn-go').disabled = false;
    document.getElementById('ov-msg').textContent = '环境已就绪，点击 ▶ 启动';
}
window.addEventListener('DOMContentLoaded', init);

// ======== BOOT ========
var em = null, started = false;
function boot(){
    if (started) return; started = true;
    var host = document.getElementById('screen-host');
    var ov = document.getElementById('ov'), ovm = document.getElementById('ov-msg'), pf = document.getElementById('barf');

    ovm.textContent = '创建 V86 实例...'; pf.style.width = '15%';

    try {
        em = new V86({
            wasm_path: 'js/v86/v86.wasm',
            bios: { url: 'js/v86/seabios.bin' },
            vga_bios: { url: 'js/v86/vgabios.bin' },
            cdrom: { url: 'os.iso' },
            memory_size: 256 * 1024 * 1024,
            vga_memory_size: 16 * 1024 * 1024,
            screen_container: host,
            autostart: true,
            log_level: 1,
        });
        L('✅ V86 实例已创建');
        SS('st-v86','ok','运行中');
    } catch(e) {
        L('❌ 创建失败: '+e.message);
        ovm.textContent = '创建失败: '+e.message;
        started = false;
        document.getElementById('btn-go').disabled = false;
        return;
    }

    em.add_listener('emulator-loaded', function(){
        L('✅ 模拟器核心加载完成'); pf.style.width='50%';
        ovm.textContent = '加载 ISO 引导镜像...';
    });

    em.add_listener('screen-set-mode', function(m){
        L('🖥 屏幕就绪: '+m.width+'x'+m.height);
        ovm.textContent = 'AuroraOS 启动中...'; pf.style.width='75%';
        SS('st-os','ok','启动中');
    });

    em.add_listener('emulator-started', function(){
        L('✅ 模拟器已启动');
        SS('st-os','ok','运行中');
    });

    var t = setTimeout(function(){
        L('🟢 启动完成！');
        ov.style.display = 'none';
        document.getElementById('btn-rst').disabled = false;
        document.getElementById('btn-cc').disabled = false;
        document.getElementById('btn-enter').disabled = false;
        document.getElementById('hint-txt').textContent = '🖱 点击屏幕捕获键盘';
    }, 12000);

    // Cancel timeout early if screen mode was set
    var modeSet = false;
    em.add_listener('screen-set-mode', function(){
        if (modeSet) return; modeSet = true;
        // Wait a few more seconds after screen is ready
        setTimeout(function(){
            if (ov.style.display !== 'none') {
                L('🟢 屏幕已显示');
                ov.style.display = 'none';
                document.getElementById('btn-rst').disabled = false;
                document.getElementById('btn-cc').disabled = false;
                document.getElementById('btn-enter').disabled = false;
                document.getElementById('hint-txt').textContent = '🖱 点击屏幕捕获键盘';
            }
            clearTimeout(t);
        }, 5000);
    });

    // Serial output
    em.add_listener('serial0-output-bytes', function(d){
        var s = '';
        for (var i = 0; i < d.length; i++) {
            var c = d[i];
            if ((c>=32 && c<=126) || c===10 || c===13) s += String.fromCharCode(c);
        }
        if (s.trim()) {
            var le = document.getElementById('log');
            le.innerHTML += '\n<span class="out">[串口] '+s.replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</span>';
            le.scrollTop = le.scrollHeight;
        }
    });
}

function reset_(){
    if (em) { em.stop(); em.destroy(); em = null; }
    started = false;
    document.getElementById('btn-go').disabled = false;
    document.getElementById('btn-rst').disabled = true;
    document.getElementById('btn-cc').disabled = true;
    document.getElementById('btn-enter').disabled = true;
    document.getElementById('hint-txt').textContent = '';
    document.getElementById('ov').style.display = 'flex';
    document.getElementById('ov-msg').textContent = '已重置，点击启动';
    document.getElementById('barf').style.width = '0%';
    document.getElementById('log').innerHTML = '🔍 诊断日志';
    SS('st-os','loading','等待启动');
}

function k(type){
    if (!em) return;
    if (type === 'enter') { em.serial0_send('\n'); L('📤 Enter'); }
    else if (type === 'ctrl+c') {
        var c = document.querySelector('#screen-host canvas');
        if (c) c.dispatchEvent(new KeyboardEvent('keydown',{keyCode:67,ctrlKey:true,bubbles:true}));
        L('📤 Ctrl+C');
    }
}
</script>
</body>
</html>
